version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentosuser
      POSTGRES_PASSWORD: agentospassword
      POSTGRES_DB: agentosdb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentosuser -d agentosdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
